# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release', artifact: "*_linux_macos.tar.gz.zip"}
          - {os: windows-latest, r: 'release', artifact: "*_win.zip.zip"}
          - {os: ubuntu-latest,   r: 'release', artifact: "*_linux_macos.tar.gz.zip"}

    env:
      PACKAGE_PASSWORD: ${{ secrets.PACKAGE_PASSWORD }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install numpy tqdm

      - name: Configure reticulate Python
        run: |
          python -c "import numpy; import tqdm"

      - name: Install 7-Zip
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Extract encrypted archive (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ZIPFILE=$(find . -maxdepth 1 -type f -name "${{ matrix.config.artifact }}" -print -quit)

          mkdir -p extracted
          7z x -p"$PACKAGE_PASSWORD" "$ZIPFILE" -oextracted
          TARFILE=$(find extracted -type f -name "*.tar.gz" -print -quit)
          
          echo "TARFILE=$TARFILE" >> "$GITHUB_ENV"

      - name: Extract encrypted archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = Get-ChildItem . -File -Filter "${{ matrix.config.artifact }}" |
          Select-Object -First 1
          
          $extractRoot = Join-Path $env:RUNNER_TEMP "extract"
          Remove-Item $extractRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null

          7z x "-p${env:PACKAGE_PASSWORD}" $zip.FullName "-o$extractRoot"

          $innerZip = Get-ChildItem $extractRoot  -Recurse -File -Filter "*.zip" |
          Select-Object -First 1

          7z x $innerZip.FullName "-o$extractRoot"

          $desc = Get-ChildItem $extractRoot -Recurse -File -Filter "DESCRIPTION"  |
          Where-Object { (Get-Content $_.FullName -Raw) -match "^Package:" } |
          Select-Object -First 1


          $pkgRoot = Split-Path $desc.FullName -Parent
          "TARFILE_RAW=$pkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          TARFILE=$(cygpath -u "$TARFILE_RAW")

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: .
          extra-packages: any::rcmdcheck, any::reticulate, any::Rcpp, any::RcppEigen, any::tinytest, any::remotes
          needs: check

      - name: Debug package input
        shell: bash
        run: |
          echo "PKGDIR=$TARFILE"
          ls -la "$TARFILE_RAW"

      - name: Run R CMD check
        shell: bash
        run: |
          R CMD check "$TARFILE" --no-manual --as-cran

      - name: Upload R CMD check logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: r-check-logs
          path: |
            **/*.Rcheck/
            **/00check.log
